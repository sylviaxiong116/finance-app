<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人理财助手</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@5.12.8/dist/reset.min.css">
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.6/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/antd@5.12.8/dist/antd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/dayjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; }
        #root { min-height: 100vh; }
        .profit-up { color: #ef4747; }
        .profit-down { color: #52c41a; }
        .profit-zero { color: #999; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;
    const { ConfigProvider, Layout, Menu, Card, Table, Button, Modal, Form, Input, Select, DatePicker, Upload, Statistic, Row, Col, Alert, Tag, message, Spin } = antd;
    const { Header, Sider, Content } = Layout;
    const { Option } = Select;
    const { TextArea } = Input;
    const { Dragger } = Upload;
    const { RangePicker } = DatePicker;

    const API_BASE = '/api';

    // API 工具函数
    const api = {
        getHoldings: () => fetch(`${API_BASE}/holdings`).then(r => r.json()),
        createHolding: (data) => fetch(`${API_BASE}/holdings`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) }).then(r => r.json()),
        updateHolding: (id, data) => fetch(`${API_BASE}/holdings/${id}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) }).then(r => r.json()),
        deleteHolding: (id) => fetch(`${API_BASE}/holdings/${id}`, { method: 'DELETE' }).then(r => r.json()),
        getAccounts: () => fetch(`${API_BASE}/holdings/accounts`).then(r => r.json()),
        createAccount: (data) => fetch(`${API_BASE}/holdings/accounts`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) }).then(r => r.json()),
        getAnalysis: () => fetch(`${API_BASE}/analysis/summary`).then(r => r.json()),
        importCSV: (formData) => fetch(`${API_BASE}/import/csv`, { method: 'POST', body: formData }).then(r => r.json()),
    };

    // 格式化盈亏颜色
    const profitClass = (val) => val > 0 ? 'profit-up' : val < 0 ? 'profit-down' : 'profit-zero';
    const profitPrefix = (val) => val > 0 ? '+' : '';
    const fmtNum = (v) => (v || 0).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const fmtPct = (v) => `${profitPrefix(v)}${v?.toFixed(2) || '0.00'}%`;

    // 主应用组件
    function App() {
        const [page, setPage] = useState('dashboard');
        const [holdings, setHoldings] = useState([]);
        const [accounts, setAccounts] = useState([]);
        const [analysis, setAnalysis] = useState(null);
        const [loading, setLoading] = useState(true);
        const [modalType, setModalType] = useState(null);
        const [editItem, setEditItem] = useState(null);
        const [form] = Form.useForm();

        const loadData = async () => {
            setLoading(true);
            try {
                const [h, a, an] = await Promise.all([api.getHoldings(), api.getAccounts(), api.getAnalysis()]);
                setHoldings(h);
                setAccounts(a);
                setAnalysis(an);
            } catch(e) { console.error(e); }
            setLoading(false);
        };

        useEffect(() => { loadData(); }, []);

        const openModal = (type, item = null) => { setEditItem(item); setModalType(type); form.resetFields(); if(item) form.setFieldsValue(item); };
        const closeModal = () => { setModalType(null); setEditItem(null); };

        const handleSubmit = async () => {
            try {
                const values = await form.validateFields();
                if (editItem) { await api.updateHolding(editItem.id, values); message.success('更新成功'); }
                else { await api.createHolding(values); message.success('添加成功'); }
                closeModal(); loadData();
            } catch(e) { console.error(e); }
        };

        const handleDelete = async (id) => {
            await api.deleteHolding(id); message.success('删除成功'); loadData();
        };

        const menuItems = [
            { key: 'dashboard', label: '📊 仪表盘' },
            { key: 'holdings', label: '💰 持仓管理' },
            { key: 'import', label: '📥 数据导入' },
            { key: 'analysis', label: '📈 投资分析' },
        ];

        return (
            <Layout style={{ minHeight: '100vh' }}>
                <Sider theme="dark" style={{ position: 'fixed', height: '100vh', left: 0, top: 0 }}>
                    <div style={{ color: '#fff', textAlign: 'center', padding: '20px 0', fontSize: '18px', fontWeight: 'bold' }}>💹 个人理财助手</div>
                    <Menu theme="dark" selectedKeys={[page]} items={menuItems} onClick={({ key }) => setPage(key)} />
                </Sider>
                <Layout style={{ marginLeft: 200 }}>
                    <Header style={{ background: '#fff', padding: '0 24px', boxShadow: '0 2px 8px rgba(0,0,0,0.1)' }}>
                        <div style={{ fontSize: '20px', fontWeight: 600 }}>个人理财助手</div>
                    </Header>
                    <Content style={{ padding: '24px' }}>
                        <Spin spinning={loading}>
                            {page === 'dashboard' && <Dashboard analysis={analysis} />}
                            {page === 'holdings' && <Holdings holdings={holdings} accounts={accounts} onEdit={openModal} onDelete={handleDelete} onRefresh={loadData} />}
                            {page === 'import' && <ImportPage accounts={accounts} onSuccess={loadData} />}
                            {page === 'analysis' && <Analysis analysis={analysis} holdings={holdings} />}
                        </Spin>
                    </Content>
                </Layout>
                <Modal title={editItem ? '编辑持仓' : '添加持仓'} open={!!modalType} onOk={handleSubmit} onCancel={closeModal} okText="确认" cancelText="取消">
                    <Form form={form} layout="vertical">
                        <Form.Item name="name" label="名称" rules={[{ required: true }]}><Input placeholder="如：沪深300ETF" /></Form.Item>
                        <Form.Item name="code" label="代码" rules={[{ required: true }]}><Input placeholder="如：510300" /></Form.Item>
                        <Form.Item name="type" label="类型" rules={[{ required: true }]}><Select placeholder="选择类型"><Option value="fund">基金</Option><Option value="stock">股票</Option><Option value="bond">债券</Option></Select></Form.Item>
                        <Form.Item name="buy_price" label="买入价格" rules={[{ required: true }]}><Input type="number" placeholder="成本价" /></Form.Item>
                        <Form.Item name="shares" label="持仓数量" rules={[{ required: true }]}><Input type="number" placeholder="持有份额" /></Form.Item>
                        <Form.Item name="buy_date" label="买入日期" rules={[{ required: true }]}><Input placeholder="格式：2024-01-01" /></Form.Item>
                        <Form.Item name="account_id" label="所属账户" rules={[{ required: true }]}><Select>{accounts.map(a => <Option key={a.id} value={a.id}>{a.name}</Option>)}</Select></Form.Item>
                    </Form>
                </Modal>
            </Layout>
        );
    }

    // 仪表盘
    function Dashboard({ analysis }) {
        const pieRef = useRef(null);
        const chartRef = useRef(null);

        useEffect(() => {
            if(analysis?.asset_allocation) {
                const chart = echarts.init(pieRef.current);
                const data = Object.entries(analysis.asset_allocation).filter(([_, v]) => v > 0).map(([k, v]) => ({ name: {fund:'基金', stock:'股票', bond:'债券'}[k]||k, value: v }));
                chart.setOption({ title: { text: '资产配置', left: 'center', top: 10 }, tooltip: { trigger: 'item' }, series: [{ type: 'pie', radius: ['40%', '70%'], data, label: { formatter: '{b}: {d}%' }, itemStyle: { borderRadius: 8, borderColor: '#fff', borderWidth: 2 } }], color: ['#1677ff', '#52c41a', '#faad14'] });
            }
            if(analysis?.holdings_summary?.length > 0) {
                const chart = echarts.init(chartRef.current);
                const names = analysis.holdings_summary.map(h => h.name);
                const profits = analysis.holdings_summary.map(h => h.profit_loss);
                const pcts = analysis.holdings_summary.map(h => h.profit_loss_pct);
                chart.setOption({ title: { text: '各持仓盈亏', left: 'center', top: 10 }, tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } }, legend: { data: ['盈亏金额', '收益率'], top: 40 }, grid: { left: '3%', right: '4%', bottom: '3%', top: 90, containLabel: true }, xAxis: { type: 'category', data: names }, yAxis: [{ type: 'value', name: '金额(元)' }, { type: 'value', name: '收益率(%)', splitLine: { show: false } }], series: [{ name: '盈亏金额', type: 'bar', data: profits, itemStyle: { color: (p) => p.data >= 0 ? '#ef4747' : '#52c41a' } }, { name: '收益率', type: 'line', yAxisIndex: 1, data: pcts, itemStyle: { color: '#1677ff' } }] });
            }
        }, [analysis]);

        if(!analysis) return <Card><Alert message="暂无数据，请先添加持仓" /></Card>;

        const riskColor = { '低': 'green', '中': 'orange', '高': 'red' }[analysis.risk_level] || 'default';

        return (
            <div>
                <Row gutter={16} style={{ marginBottom: 24 }}>
                    <Col span={6}><Card><Statistic title="总资产" value={analysis.total_assets} prefix="¥" precision={2} /></Card></Col>
                    <Col span={6}><Card><Statistic title="总成本" value={analysis.total_cost} prefix="¥" precision={2} /></Card></Col>
                    <Col span={6}><Card><Statistic title="总收益" value={analysis.total_profit} prefix={analysis.total_profit >= 0 ? '+' : ''} suffix="元" precision={2} valueStyle={{ color: analysis.total_profit >= 0 ? '#ef4747' : '#52c41a' }} /></Card></Col>
                    <Col span={6}><Card><Statistic title="收益率" value={analysis.total_profit_pct} suffix="%" precision={2} valueStyle={{ color: analysis.total_profit_pct >= 0 ? '#ef4747' : '#52c41a' }} /></Card></Col>
                </Row>
                <Row gutter={16}>
                    <Col span={12}><Card><div ref={pieRef} style={{ width: '100%', height: 350 }} /></Card></Col>
                    <Col span={12}><Card><div ref={chartRef} style={{ width: '100%', height: 350 }} /></Card></Col>
                </Row>
            </div>
        );
    }

    // 持仓管理
    function Holdings({ holdings, accounts, onEdit, onDelete, onRefresh }) {
        const columns = [
            { title: '名称', dataIndex: 'name', key: 'name' },
            { title: '代码', dataIndex: 'code', key: 'code' },
            { title: '类型', dataIndex: 'type', key: 'type', render: (t) => ({fund:'基金', stock:'股票', bond:'债券'}[t]||t) },
            { title: '买入价', dataIndex: 'buy_price', key: 'buy_price', render: (v) => `¥${fmtNum(v)}` },
            { title: '现价', dataIndex: 'market_price', key: 'market_price', render: (v) => v > 0 ? `¥${fmtNum(v)}` : '-' },
            { title: '份额', dataIndex: 'shares', key: 'shares', render: (v) => fmtNum(v) },
            { title: '成本', dataIndex: 'cost', key: 'cost', render: (v) => `¥${fmtNum(v)}` },
            { title: '市值', dataIndex: 'current_value', key: 'current_value', render: (v) => v > 0 ? `¥${fmtNum(v)}` : '-' },
            { title: '盈亏', key: 'profit_loss', render: (_, r) => <span className={profitClass(r.profit_loss)}>{r.profit_loss >= 0 ? '+' : ''}¥{fmtNum(r.profit_loss)}</span> },
            { title: '收益率', key: 'profit_loss_pct', render: (_, r) => <Tag color={r.profit_loss >= 0 ? 'red' : 'green'}>{fmtPct(r.profit_loss_pct)}</Tag> },
            { title: '操作', key: 'action', render: (_, r) => <><Button type="link" onClick={() => onEdit('edit', r)}>编辑</Button><Button type="link" danger onClick={() => onDelete(r.id)}>删除</Button></> },
        ];

        return (
            <Card title="持仓管理" extra={<Button type="primary" onClick={() => onEdit('add')}>+ 添加持仓</Button>}>
                <Table dataSource={holdings} columns={columns} rowKey="id" pagination={false} />
            </Card>
        );
    }

    // 数据导入
    function ImportPage({ accounts, onSuccess }) {
        const [uploading, setUploading] = useState(false);
        const [result, setResult] = useState(null);
        const [accountId, setAccountId] = useState(1);

        const handleUpload = async (file) => {
            setUploading(true);
            setResult(null);
            const formData = new FormData();
            formData.append('file', file);
            formData.append('account_id', accountId);
            try {
                const res = await api.importCSV(formData);
                setResult(res);
                if(res.success > 0) { message.success(`成功导入 ${res.success} 条`); onSuccess(); }
            } catch(e) { message.error('导入失败'); }
            setUploading(false);
            return false;
        };

        return (
            <Card title="数据导入">
                <Form layout="vertical">
                    <Form.Item label="导入到账户">
                        <Select value={accountId} onChange={setAccountId} style={{ width: 200 }}>
                            {accounts.map(a => <Option key={a.id} value={a.id}>{a.name}</Option>)}
                        </Select>
                    </Form.Item>
                    <Form.Item label="上传 CSV 文件">
                        <Dragger accept=".csv" beforeUpload={handleUpload} showUploadList={false}>
                            <p style={{ fontSize: 48 }}>📁</p>
                            <p>点击或拖拽 CSV 文件到此处</p>
                            <p style={{ color: '#999', fontSize: 12 }}>支持从支付宝/银行导出的对账单</p>
                        </Dragger>
                    </Form.Item>
                </Form>
                {result && <Alert style={{ marginTop: 16 }} type={result.failed > 0 ? 'warning' : 'success'} message={`成功: ${result.success} 条，失败: ${result.failed} 条`} description={result.errors?.join('；')} />}
                <Card style={{ marginTop: 16 }} title="CSV 格式说明">
                    <p>支持中英文列名，每行一条持仓记录：</p>
                    <pre style={{ background: '#f5f5f5', padding: 12, marginTop: 8, borderRadius: 4 }}>名称,代码,类型,买入价格,持仓数量,买入日期{'\n'}沪深300ETF,510300,基金,3.50,1000,2024-01-15{'\n'}贵州茅台,600519,股票,1800.00,10,2024-03-01</pre>
                </Card>
            </Card>
        );
    }

    // 投资分析
    function Analysis({ analysis, holdings }) {
        if(!analysis) return <Card><Alert message="暂无数据" /></Card>;

        const riskColor = { '低': 'success', '中': 'warning', '高': 'error' }[analysis.risk_level] || 'default';
        const typeColor = { 'success': '💚', 'warning': '💛', 'error': '❤️' };
        const typeName = { success: '建议', warning: '提示', info: '信息' };

        return (
            <div>
                <Card style={{ marginBottom: 16 }}><Tag color={riskColor} style={{ fontSize: 16, padding: '4px 12px' }}>⚠️ 当前风险等级：{analysis.risk_level}</Tag></Card>
                <Row gutter={16} style={{ marginBottom: 16 }}>
                    {analysis.suggestions?.map((s, i) => (
                        <Col span={8} key={i} style={{ marginBottom: 16 }}>
                            <Card size="small">
                                <Alert message={<><b>{typeColor[s.type] || '💡'} {s.title}</b><br/><span style={{ fontWeight: 'normal' }}>{s.content}</span></>} type={s.type} showIcon />
                            </Card>
                        </Col>
                    ))}
                </Row>
                <Card title="持仓收益率排名">
                    <Table
                        dataSource={analysis.holdings_summary?.sort((a, b) => b.profit_loss_pct - a.profit_loss_pct)}
                        rowKey="id"
                        pagination={false}
                        columns={[
                            { title: '排名', render: (_, __, i) => i + 1 },
                            { title: '名称', dataIndex: 'name' },
                            { title: '类型', dataIndex: 'type', render: (t) => ({fund:'基金', stock:'股票', bond:'债券'}[t]||t) },
                            { title: '盈亏', dataIndex: 'profit_loss', render: (v) => <span className={profitClass(v)}>{v >= 0 ? '+' : ''}¥{fmtNum(v)}</span> },
                            { title: '收益率', dataIndex: 'profit_loss_pct', render: (v) => <Tag color={v >= 0 ? 'red' : 'green'}>{fmtPct(v)}</Tag> },
                        ]}
                    />
                </Card>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ConfigProvider locale={{}}><App /></ConfigProvider>);
    </script>
</body>
</html>
